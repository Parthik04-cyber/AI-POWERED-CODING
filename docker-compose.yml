version: '3.8'

services:
  mongodb:
    image: mongo:latest
    container_name: ai-coding-mongodb
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: password
      MONGO_INITDB_DATABASE: ai-coding-platform
    volumes:
      - mongodb_data:/data/db
    networks:
      - ai-coding-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ai-coding-backend
    ports:
      - "5000:5000"
    environment:
      NODE_ENV: development
      PORT: 5000
      MONGODB_URI: mongodb://admin:password@mongodb:27017/ai-coding-platform
      JWT_SECRET: your_jwt_secret_key_here
      JUDGE0_API_BASE_URL: https://judge0-ce.p.rapidapi.com
      JUDGE0_API_KEY: ${JUDGE0_API_KEY}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      FRONTEND_URL: http://localhost:3000
    depends_on:
      - mongodb
    networks:
      - ai-coding-network
    command: npm run dev

volumes:
  mongodb_data:

networks:
  ai-coding-network:
    driver: bridge
