version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: ai-coding-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: codemaster
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - ai-coding-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ai-coding-backend
    ports:
      - "5000:5000"
    environment:
      NODE_ENV: development
      PORT: 5000
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/codemaster
      JWT_SECRET: your_jwt_secret_key_here
      JUDGE0_API_BASE_URL: https://judge0-ce.p.rapidapi.com
      JUDGE0_API_KEY: ${JUDGE0_API_KEY}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      FRONTEND_URL: http://localhost:3000
    depends_on:
      - postgres
    networks:
      - ai-coding-network
    command: npm run dev

volumes:
  postgres_data:

networks:
  ai-coding-network:
    driver: bridge
