# Judge0 CE configuration for local development
# Change passwords before using outside local development.

POSTGRES_HOST=judge0-db
POSTGRES_PORT=5432
POSTGRES_DB=judge0
POSTGRES_USER=judge0
POSTGRES_PASSWORD=judge0_postgres_password_change_me

REDIS_HOST=judge0-redis
